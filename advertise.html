<!-- TOP AD -->
<div class="container ad">
<ins class="adsbygoogle"

     data-ad-client="YOUR-ADSENSE-ID"

<div class="container">

  <div class="form-card" id="form">

    <form id="jobForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="tel" id="phone" placeholder="Phone (+91...)" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="location" placeholder="Location" required>
      <input type="text" id="job" placeholder="Job Title" required>
      <input type="number" id="openings" placeholder="Openings" required>
      <input type="text" id="salary" placeholder="Salary" required>
      <textarea id="desc" placeholder="Job Description" required></textarea>

      <button class="btn" type="submit">Submit</button>
    </form>
  </div>

<script>
document.getElementById("jobForm").addEventListener("submit", function(e){
e.preventDefault();

let body = `
Name: ${name.value}
Phone: ${phone.value}
Email: ${email.value}
Location: ${location.value}
Job: ${job.value}
Openings: ${openings.value}
Salary: ${salary.value}

Description:
${desc.value}
`;

window.location.href = "mailto:joblynklive@gmail.com?subject=Job Posting&body=" + encodeURIComponent(body);
});
</script>
