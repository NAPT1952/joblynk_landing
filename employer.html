<!-- FORM -->
<div class="card">
 
<h2>Submit Job Details</h2>

<p>
Fill the form below and your vacancy will be reviewed and published within 24 hours.
</p>

<form id="jobForm" action="https://formsubmit.co/joblynklive@gmail.com" method="POST">

    <!-- SETTINGS -->
    <input type="hidden" name="_captcha" value="false">

    <input type="hidden" name="_subject" value="New Employer Job Posting - JobLynk.live">

    <input type="hidden" name="_template" value="table">

    <!-- NAME -->
    <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="Full Name" required>
    </div>

    <!-- EMAIL -->
    <div class="form-group">
        <label>Email Address *</label>
        <input type="email" name="Email" required>
    </div>

    <!-- PHONE -->
    <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" name="Phone" required>
    </div>

    <!-- LOCATION -->
    <div class="form-group">
        <label>Job Location *</label>
        <input type="text" name="Location" required>
    </div>

    <!-- JOB TITLE -->
    <div class="form-group">
        <label>Job Title *</label>
        <input type="text" name="Job Title" required>
    </div>

    <!-- OPENINGS -->
    <div class="form-group">
        <label>Number of Openings *</label>
        <input type="number" name="Openings" required>
    </div>

    <!-- SALARY -->
    <div class="form-group">
        <label>Salary *</label>
        <input type="text" name="Salary" required>
    </div>

    <!-- DESCRIPTION -->
    <div class="form-group">
        <label>Job Description *</label>
        <textarea name="Job Description" rows="6" required></textarea>
    </div>

    <!-- BUTTON -->
    <button type="submit">Submit Job Posting</button>

</form>

<!-- SUCCESS MESSAGE -->
<div id="successMessage" style="display:none;margin-top:20px;padding:15px;background:#d4edda;color:#155724;border-radius:10px;">
✅ Your job posting has been submitted successfully.
</div>

</div>

<script>
const form = document.getElementById("jobForm");

form.addEventListener("submit", async function(e) {

    e.preventDefault();

    const formData = new FormData(form);

    fetch("https://formsubmit.co/ajax/joblynklive@gmail.com", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {

        document.getElementById("successMessage").style.display = "block";

        form.reset();

        window.scrollTo({
            top: form.offsetTop,
            behavior: "smooth"
        });

    })
    .catch(error => {
        alert("Error sending form. Please try again.");
    });

});
</script>
